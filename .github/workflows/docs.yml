name: Documentation

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  sphinx:
    runs-on: 'ubuntu-latest'
    steps:
    - uses: actions/checkout@v6

    - name: Install Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Setup java
      uses: actions/setup-java@v4
      with:
        java-version: 21
        distribution: 'zulu'

    - run: df -h

    - name: "node-cleanup"
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo docker builder prune -a

    - run: df -h

    - name: Cache Dependencies
      uses: actions/cache@v5
      with:
        path: ${{ env.pythonLocation }}
        key: docs-${{ hashFiles('requirements.txt') }}-${{ hashFiles('docs/requirements.txt') }}-${{ hashFiles('docs/extensions.txt') }}
        restore-keys: |
          docs-

    - run: df -h
    
    - name: Install Dependencies
      run: |
        pip install --upgrade -vv pipdeptree '.[all]' 'python-terrier>=1.0' 'pyserini>=0.36.0,<2.1.0' -r docs/requirements.txt -r docs/extensions.txt --report report.json

    - name: Node Status
      run: |
        df -h
        pip list
        cat report.json
        pipdeptree --reverse

    - name: html
      run: |
        cd docs ; make html

    - name: Upload Documentation
      uses: actions/upload-artifact@v4
      with:
        path: docs/_build/html/

    - name: linkcheck
      continue-on-error: true
      run: |
        QUICK=1 cd docs ; make linkcheck

    - name: Surface broken links as warnings
      if: "steps.linkcheck.outcome == 'failure'"
      run: |
        echo "::warning::Sphinx linkcheck found broken or redirected links"
        # Optionally parse output.txt and emit per-link warnings:
        awk -F': ' '/broken/ {print "::warning file=" $1 "::" $0}' \
          docs/_build/linkcheck/output.txt || true
